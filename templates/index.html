<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>OMR Scanner</title>

    <style>
        :root {
            --bg1: #0f172a;
            --bg2: #1d4ed8;
            --card: rgba(255, 255, 255, .08);
            --line: rgba(255, 255, 255, .12);
            --text: #e5e7eb;
        }

        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, var(--bg1), var(--bg2));
            color: var(--text);
        }

        .header {
            padding: 24px;
            text-align: center;
            font-size: 32px;
            font-weight: 800;
        }

        .container {
            width: min(96%, 1600px);
            margin: auto;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--line);
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 20px;
        }

        .upload-box {
            padding: 25px;
            background: rgba(0, 0, 0, .35);
            border-radius: 16px;
            text-align: center;
        }

        .file {
            padding: 10px;
            background: #ffffff14;
            border-radius: 12px;
            width: 100%;
            max-width: 800px;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 999px;
            border: none;
            background: linear-gradient(90deg, #06b6d4, #3b82f6);
            color: white;
            cursor: pointer;
            font-weight: bold;
        }

        .submit-btn {
            display: flex;
            justify-content: center;
            margin-top: 10px;
        }

        #progressBox {
            display: none;
        }

        #progressTrack {
            background: #1e293b;
            border-radius: 10px;
            height: 22px;
        }

        #progressBar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #06b6d4, #22c55e);
            text-align: center;
            color: #000;
            font-weight: bold;
        }

        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .table-container {
            max-height: 70vh;
            overflow: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 10px;
            border-bottom: 1px solid #334155;
            text-align: center;
        }

        th {
            background: #0b1220;
        }

        .slno {
            background: #000;
            color: #fff;
            font-weight: bold;
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.88);
            justify-content: center;
            align-items: center;
            z-index: 999;
        }

        .modal-panel {
            width: 92%;
            max-width: 980px;
            max-height: 90vh;
            overflow-y: auto;
            background: #0f172a;
            border: 1px solid rgba(255,255,255,.12);
            padding: 24px;
            border-radius: 20px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 18px;
        }

        .modal-title {
            font-size: 17px;
            font-weight: 700;
            color: #f1f5f9;
        }

        .modal-subtitle {
            font-size: 13px;
            color: #94a3b8;
            margin-top: 3px;
        }

        .modal-close {
            background: rgba(255,255,255,.08);
            border: none;
            color: #e2e8f0;
            font-size: 20px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .modal-close:hover { background: rgba(255,255,255,.16); }

        .summary-bar {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: rgba(255,255,255,.06);
            border-radius: 12px;
            padding: 12px 10px;
            text-align: center;
        }

        .stat-num {
            font-size: 22px;
            font-weight: 700;
        }

        .stat-lbl {
            font-size: 11px;
            color: #94a3b8;
            margin-top: 3px;
            text-transform: uppercase;
            letter-spacing: .04em;
        }

        .legend {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 14px;
        }

        .leg {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #94a3b8;
        }

        .leg-bar {
            width: 12px;
            height: 12px;
            border-radius: 3px;
        }

        .pill-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 7px;
        }

        .pill {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,.05);
            border-radius: 10px;
            padding: 8px 4px;
            border-left: 3px solid transparent;
            min-width: 0;
        }

        .pill .qnum {
            font-size: 10px;
            color: #64748b;
            margin-bottom: 4px;
        }

        .pill .val {
            font-size: 14px;
            font-weight: 700;
        }

        .pill.correct  { border-left-color: #22c55e; }
        .pill.correct .val  { color: #4ade80; }

        .pill.wrong    { border-left-color: #ef4444; }
        .pill.wrong .val    { color: #f87171; }

        .pill.empty    { border-left-color: #475569; }
        .pill.empty .val    { color: #64748b; }

        .pill.multiple { border-left-color: #f59e0b; }
        .pill.multiple .val { color: #fbbf24; }

        .key-level-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 18px;
        }

        .key-level-tab {
            padding: 6px 18px;
            border-radius: 999px;
            border: 1px solid #334155;
            background: transparent;
            color: #94a3b8;
            font-size: 13px;
            cursor: pointer;
            font-weight: bold;
        }

        .key-level-tab.active {
            background: rgba(59,130,246,0.18);
            border-color: #3b82f6;
            color: #60a5fa;
        }

        .key-summary-bar {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 18px;
        }

        .key-pill {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(255,255,255,.05);
            border-radius: 10px;
            padding: 8px 4px 7px;
            border-left: 3px solid #334155;
            min-width: 0;
        }

        .key-pill.is-set { border-left-color: #22c55e; }

        .key-pill .qnum {
            font-size: 10px;
            color: #64748b;
            margin-bottom: 5px;
        }

        .key-opts {
            display: flex;
            flex-direction: row;
            gap: 3px;
            justify-content: center;
            flex-wrap: nowrap;
        }

        .key-opt {
            width: 22px;
            height: 22px;
            border-radius: 4px;
            border: 1px solid #334155;
            background: transparent;
            font-size: 10px;
            color: #94a3b8;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            flex-shrink: 0;
        }

        .key-opt:hover { background: #1e293b; }

        .key-opt.sel-A { background: #172554; border-color: #3b82f6; color: #93c5fd; }
        .key-opt.sel-B { background: #14532d; border-color: #22c55e; color: #86efac; }
        .key-opt.sel-C { background: #451a03; border-color: #f59e0b; color: #fcd34d; }
        .key-opt.sel-D { background: #4a044e; border-color: #d946ef; color: #f0abfc; }
        .key-opt.sel-E { background: #1e1b4b; border-color: #8b5cf6; color: #c4b5fd; }

        .key-footer {
            display: flex;
            justify-content: flex-end;
            border-top: 1px solid #1e293b;
            padding-top: 14px;
            margin-top: 4px;
        }
    </style>
</head>

<body>

    <div class="header">OMR DETECT & EXTRACT</div>

    <div style="display:flex;justify-content:flex-end;padding:10px 20px;">
        <button class="btn" onclick="openKeyModal()">Answer Key</button>
    </div>

    <div class="container">

        <div class="card">
            <form id="uploadForm" enctype="multipart/form-data">
                <div class="upload-box">
                    <input type="file" name="files" multiple class="file">
                    <p>Upload images or ZIP</p>
                </div>

                <div class="submit-btn">
                    <button id="submitBtn" class="btn">Submit</button>
                </div>
            </form>
        </div>

        <div id="progressBox">
            <div id="progressTrack">
                <div id="progressBar">0%</div>
            </div>
            <p id="progressText">Starting...</p>
        </div>

        <div id="resultsSection" class="card" style="display:none;">

            <div class="table-header">
                <h2>Results</h2>
                <button class="btn" onclick="exportExcel()">Download Excel</button>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>SL No</th>
                            <th>Name</th>
                            <th>Centre Number</th>
                            <th>Level</th>
                            <th>DOB</th>
                            <th>Correct</th>
                            <th>Wrong</th>
                            <th>Percentage %</th>
                            <th>View</th>
                        </tr>
                    </thead>
                    <tbody id="resultsBody"></tbody>
                </table>
            </div>

        </div>

    </div>

    <div id="answerModal" class="modal">
        <div class="modal-panel">

            <div class="modal-header">
                <div>
                    <div class="modal-title" id="studentName">—</div>
                    <div class="modal-subtitle" id="studentMeta">—</div>
                </div>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>

            <div class="summary-bar" id="summaryBar"></div>

            <div class="legend">
                <div class="leg"><div class="leg-bar" style="background:#22c55e"></div> Correct</div>
                <div class="leg"><div class="leg-bar" style="background:#ef4444"></div> Wrong</div>
                <div class="leg"><div class="leg-bar" style="background:#f59e0b"></div> Multiple</div>
                <div class="leg"><div class="leg-bar" style="background:#475569"></div> Empty</div>
            </div>

            <div class="pill-grid" id="answerGrid"></div>

        </div>
    </div>

    <div id="keyModal" class="modal">
        <div class="modal-panel">

            <div class="modal-header">
                <div>
                    <div class="modal-title">Answer Key</div>
                    <div class="modal-subtitle" id="keyLevelLabel">Level: Intermediate</div>
                </div>
                <button class="modal-close" onclick="closeKeyModal()">×</button>
            </div>

            <div class="key-level-tabs">
                <button class="key-level-tab active" data-level="lower_primary"
                    onclick="switchKeyLevel('lower primary', this)">Lower Primary</button>
                <button class="key-level-tab" data-level="upper_primary"
                    onclick="switchKeyLevel('upper primary', this)">Upper Primary</button>
                <button class="key-level-tab" data-level="junior"
                    onclick="switchKeyLevel('junior', this)">Junior</button>
                <button class="key-level-tab" data-level="intermediate"
                    onclick="switchKeyLevel('intermediate', this)">Intermediate</button>
                <button class="key-level-tab" data-level="senior"
                    onclick="switchKeyLevel('senior', this)">Senior</button>
                <button class="key-level-tab" data-level="open"
                    onclick="switchKeyLevel('open', this)">Open</button>
            </div>

            <div class="key-summary-bar">
                <div class="stat-card">
                    <div class="stat-num" style="color:#38bdf8" id="kTotal">40</div>
                    <div class="stat-lbl">Total Questions</div>
                </div>
                <div class="stat-card">
                    <div class="stat-num" style="color:#4ade80" id="kSet">0</div>
                    <div class="stat-lbl">Set</div>
                </div>
                <div class="stat-card">
                    <div class="stat-num" style="color:#94a3b8" id="kEmpty">40</div>
                    <div class="stat-lbl">Empty</div>
                </div>
            </div>

            <div class="legend">
                <div class="leg"><div class="leg-bar" style="background:#3b82f6"></div> A</div>
                <div class="leg"><div class="leg-bar" style="background:#22c55e"></div> B</div>
                <div class="leg"><div class="leg-bar" style="background:#f59e0b"></div> C</div>
                <div class="leg"><div class="leg-bar" style="background:#d946ef"></div> D</div>
                <div class="leg"><div class="leg-bar" style="background:#8b5cf6"></div> E</div>
                <div class="leg"><div class="leg-bar" style="background:#334155"></div> Empty</div>
            </div>

            <div class="pill-grid" id="keyGrid"></div>

            <div class="key-footer">
                <button class="btn" onclick="saveAnswerKey()">Save Key</button>
            </div>

        </div>
    </div>

    <script>
        let batchId = "";
        let offset = 0;
        let rowCount = 0;
        let allResults = {};

        document.getElementById("uploadForm").addEventListener("submit", async function (e) {
            e.preventDefault();

            const btn = document.getElementById("submitBtn");
            btn.disabled = true;

            offset = 0;
            rowCount = 0;
            allResults = {};

            document.getElementById("resultsBody").innerHTML = "";
            document.getElementById("answerGrid").innerHTML = "";
            document.getElementById("studentName").innerText = "";
            document.getElementById("studentMeta").innerText = "";

            const res = await fetch("/api/start", { method: "POST" });
            const data = await res.json();
            batchId = data.batch_id;

            document.getElementById("progressBox").style.display = "block";
            document.getElementById("resultsSection").style.display = "block";

            const formData = new FormData(this);
            formData.append("batch_id", batchId);

            fetch("/api/upload", { method: "POST", body: formData })
            .then(() => {
                document.querySelector(".file").value = "";
            });

            poll();

            btn.disabled = false;
        });

        function poll() {
            const interval = setInterval(async () => {
                const res = await fetch(`/api/results/${batchId}?offset=${offset}`);
                const data = await res.json();

                updateProgress(data);
                appendRows(data.results || []);
                offset = data.offset || offset;

                if (data.status === "Completed") {
                    clearInterval(interval);
                    document.getElementById("progressBox").style.display = "none";
                }
            }, 1200);
        }

        function updateProgress(data) {
            let percent = data.percent || 0;
            document.getElementById("progressBar").style.width = percent + "%";
            document.getElementById("progressBar").innerText = percent + "%";
            document.getElementById("progressText").innerText = data.status;
        }

        function appendRows(results) {
            const tbody = document.getElementById("resultsBody");

            results.forEach(r => {
                rowCount++;

                allResults[r.key] = r;

                tbody.innerHTML += `
                    <tr>
                    <td class="slno">${rowCount}</td>
                    <td>${r.name || "-"}</td>
                    <td>${r.centre_number || "-"}</td>
                    <td>${r.level || "-"}</td>
                    <td>${r.dob || "-"}</td>
                    <td style="color:#22c55e">${r.correct}</td>
                    <td style="color:#ef4444">${r.wrong}</td>
                    <td>${r.percentage}%</td>
                    <td><button class="btn" onclick="view('${r.key}')">View</button></td>
                    </tr>`;
            });
        }

        function view(key) {
            const data = allResults[key];

            document.getElementById("studentName").innerText = data.name || "—";
            document.getElementById("studentMeta").innerText =
                [data.centre_number, data.level, data.dob].filter(Boolean).join("  ·  ");

            const total = data.answers ? data.answers.length : 0;
            const correct = data.correct  || 0;
            const wrong = data.wrong    || 0;
            const empty = data.answers  ? data.answers.filter(a => a.value === "Empty").length : 0;
            const multi = data.answers  ? data.answers.filter(a => a.value && a.value.includes("Multiple")).length : 0;

            document.getElementById("summaryBar").innerHTML = `
                <div class="stat-card">
                    <div class="stat-num" style="color:#4ade80">${correct}</div>
                    <div class="stat-lbl">Correct</div>
                </div>
                <div class="stat-card">
                    <div class="stat-num" style="color:#f87171">${wrong}</div>
                    <div class="stat-lbl">Wrong</div>
                </div>
                <div class="stat-card">
                    <div class="stat-num" style="color:#fbbf24">${multi}</div>
                    <div class="stat-lbl">Multiple</div>
                </div>
                <div class="stat-card">
                    <div class="stat-num" style="color:#94a3b8">${empty}</div>
                    <div class="stat-lbl">Empty</div>
                </div>
                <div class="stat-card">
                    <div class="stat-num" style="color:#38bdf8">${data.percentage}%</div>
                    <div class="stat-lbl">Score</div>
                </div>`;

            let html = "";

            (data.answers || []).forEach((a, i) => {
                let cls = "pill";

                if (a.value === "Empty") cls += " empty";
                else if (a.value && a.value.includes("Multiple")) cls += " multiple";
                else if (a.is_correct) cls += " correct";
                else cls += " wrong";

                const display = (a.value === "Empty" || !a.value) ? "—" : a.value;

                html += `<div class="${cls}">
                    <span class="qnum">Q${String(i + 1).padStart(2, "0")}</span>
                    <span class="val">${display}</span>
                </div>`;
            });

            document.getElementById("answerGrid").innerHTML = html;
            document.getElementById("answerModal").style.display = "flex";
        }

        function closeModal() {
            document.getElementById("answerModal").style.display = "none";
        }

        function exportExcel() {
            window.location.href = "/api/export_latest";
        }

        document.getElementById("answerModal").addEventListener("click", function(e) {
            if (e.target.id === "answerModal") closeModal();
        });

        let keyData = {};
        let currentKeyLevel = "intermediate";

        async function openKeyModal() {
            document.getElementById("keyModal").style.display = "flex";
            currentKeyLevel = "intermediate";

            document.querySelectorAll(".key-level-tab").forEach(t =>
                t.classList.toggle("active", t.dataset.level === "intermediate")
            );
            document.getElementById("keyLevelLabel").innerText = "Level: Intermediate";

            await loadKeyForLevel("intermediate");
        }

        function closeKeyModal() {
            document.getElementById("keyModal").style.display = "none";
        }

        document.getElementById("keyModal").addEventListener("click", function(e) {
            if (e.target.id === "keyModal") closeKeyModal();
        });

        async function switchKeyLevel(level, btn) {
            currentKeyLevel = level;
            document.querySelectorAll(".key-level-tab").forEach(t => t.classList.remove("active"));
            btn.classList.add("active");
            document.getElementById("keyLevelLabel").innerText =
                "Level: " + level.charAt(0).toUpperCase() + level.slice(1);
            await loadKeyForLevel(level);
        }

        async function loadKeyForLevel(level) {
            try {
                const res = await fetch(`/api/get_answer_key/${level}`);
                keyData = await res.json();
            } catch (err) {
                keyData = {};
            }
            buildKeyGrid();
        }

        function buildKeyGrid() {
            const grid = document.getElementById("keyGrid");
            grid.innerHTML = "";

            for (let i = 1; i <= 40; i++) {
                const q = `Q${String(i).padStart(2, "0")}`;
                const cur = keyData[q] || "";
                const isSet = !!cur;

                const pill = document.createElement("div");
                pill.className = "key-pill" + (isSet ? " is-set" : "");

                const opts = ["A", "B", "C", "D", "E"].map(opt => {
                    const active = cur === opt ? ` sel-${opt}` : "";
                    return `<button class="key-opt${active}"
                        onclick="setKey('${q}','${opt}',this)">${opt}</button>`;
                }).join("");

                pill.innerHTML = `
                    <span class="qnum">${q}</span>
                    <div class="key-opts">${opts}</div>`;

                grid.appendChild(pill);
            }

            updateKeyStats();
        }

        function setKey(q, val, btn) {
            if (keyData[q] === val) {
                delete keyData[q];
            } else {
                keyData[q] = val;
            }
            buildKeyGrid();
        }

        function updateKeyStats() {
            const vals = Object.values(keyData);
            document.getElementById("kSet").textContent   = vals.length;
            document.getElementById("kEmpty").textContent = 40 - vals.length;
        }

        async function saveAnswerKey() {
            const res = await fetch("/api/save_answer_key", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ level: currentKeyLevel, answers: keyData })
            });
            const data = await res.json();
            alert(data.message || "Saved");
            closeKeyModal();
        }

    </script>

</body>

</html>
